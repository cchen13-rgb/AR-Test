<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- LOAD AFRAME FIRST -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- THEN MINDAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body style="margin:0; overflow:hidden;">

    <!-- DEBUG TEXT -->
    <div style="position:fixed; top:20px; left:20px; z-index:999; color:black;">
      Page Loaded
    </div>

    <!-- START BUTTON -->
    <button id="startBtn" style="position:fixed; top:60px; left:20px; z-index:999;">
      Start AR
    </button>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box color="red" position="0 0 0" depth="0.5" height="0.5" width="0.5"></a-box>
      </a-entity>

    </a-scene>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const scene = document.querySelector('a-scene');
        const btn = document.getElementById('startBtn');

        btn.addEventListener('click', () => {
          const mindarSystem = scene.systems["mindar-image-system"];
          if (mindarSystem) {
            mindarSystem.start();
            btn.style.display = "none";
          } else {
            alert("MindAR not loaded");
          }
        });
      });
    </script>

  </body>
</html>
