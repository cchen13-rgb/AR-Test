<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kardia on Phone</title>
  <link rel="stylesheet" href="https://use.typekit.net/mjw2tfe.css">
  <style>
    :root {
      --blue:    #1f97dd;
      --blue-dk: #19669a;
      --border:  rgba(35, 113, 176, 0.55);
      --ink:     #124570;
      --pink:    #ff7da4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "cofo-sans-pixel", sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      image-rendering: pixelated;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.85s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── PHONE COLUMN ── */
    .layout {
      width: min(480px, 100vw);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* All panels: light opaque bg so text stays legible over dithered background */
    .panel {
      border: 2px solid var(--border);
      background: rgba(239, 248, 255, 0.92);
    }

    /* ── TEXTURE PANELS ── */
    .tex {
      flex-shrink: 0;
      height: 27vh;
      max-height: 200px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .tex img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tex.flip { transform: scaleY(-1); }

    /* ══ TITLE ══ */
    .click-bar {
      flex-shrink: 0;
      padding: 14px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }
    .click-bar strong {
      font-family: "fayte-pixel-hard", sans-serif;
      font-size: 15px;
    }

    .title-mid {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }

    .alt-tag {
      font-family: "fayte-pixel-hard", sans-serif;
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--ink);
      opacity: 0.5;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .big-title {
      font-family: "fayte-pixel-hard", sans-serif;
      font-size: clamp(60px, 19vw, 92px);
      line-height: 0.88;
      color: var(--blue);
      text-transform: uppercase;
      
    }

    .on-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      width: 100%;
      justify-content: center;
    }
    .on-row span {
      font-family: "fayte-pixel-hard", sans-serif;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--ink);
      opacity: 0.5;
    }
    .on-row::before, .on-row::after {
      content: '';
      flex: 1;
      max-width: 80px;
      height: 1px;
      background: var(--ink);
      opacity: 0.2;
    }

    /* ══ LOADING ══ */
    .spacer {
      flex-shrink: 0;
      height: 50px;
    }

    .loading-mid {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    #compassSvg {
      animation: spin 5s linear infinite;
      transform-origin: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-lbl {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--ink);
      opacity: 0.6;
    }

    /* ══ GAME ══ */
    .quest-zone {
      flex-shrink: 0;
      padding: 13px 15px;
      min-height: 94px;
    }
    .quest-eyebrow {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--pink);
      opacity: 0.8;
      margin-bottom: 7px;
    }
    #questText {
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--pink);
      line-height: 1.75;
      white-space: pre-line;
    }

    .chapter-strip {
      flex-shrink: 0;
      padding: 10px 16px;
      text-align: center;
      font-family: "fayte-pixel-hard", sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--ink);
      transition: opacity 0.6s ease;
    }
    .chapter-strip.fade {
      opacity: 0;
    }

    .cam-zone {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .cam-zone video,
    .cam-zone canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #holdLabel {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      text-shadow: 0 0 10px var(--blue);
    }
    #holdLabel.show { opacity: 0.9; }

    .diag-zone {
      flex-shrink: 0;
      display: flex;
      min-height: 128px;
      max-height: 158px;
      cursor: pointer;
    }
    .profile-col {
      width: 108px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .profile-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .diag-inner {
      flex: 1;
      padding: 13px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    #speakerName {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--blue-dk);
      opacity: 0.7;
    }
    #dialogueText {
      font-size: 11px;
      line-height: 1.8;
      color: var(--ink);
      flex: 1;
    }
    .tap-cue {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--ink);
      opacity: 0.22;
      text-align: right;
    }

  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- TITLE -->
<div class="screen active" id="s-title">
  <div class="layout">
    <div class="tex"><img src="img/texture.png" alt=""></div>
    <div class="panel click-bar"><strong>CLICK</strong>&ensp;<small>ANYWHERE TO START</small></div>
    <div class="panel title-mid">
      <div class="alt-tag">Alternative Reality</div>
      <div class="big-title">KARDIA</div>
      <div class="on-row"><span>ON</span></div>
      <div class="big-title">PHONE</div>
    </div>
    <div class="tex flip"><img src="img/texture.png" alt=""></div>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="s-loading">
  <div class="layout">
    <div class="tex"><img src="img/texture.png" alt=""></div>
    <div class="panel spacer"></div>
    <div class="panel loading-mid">
      <img id="compassSvg" src="img/loading.png" width="138" height="138" alt="loading">
      <div class="load-lbl">Loading..</div>
    </div>
    <div class="tex flip"><img src="img/texture.png" alt=""></div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="layout">
    <div class="panel quest-zone">
      <div class="quest-eyebrow">QUEST OBJECTIVE</div>
      <div id="questText">Awaiting signal…</div>
    </div>
    <div class="panel chapter-strip" id="chapterBar">CHAPTER 1 : The Beginnings</div>
    <div class="cam-zone">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="holdLabel">HOLD STEADY…</div>
    </div>
    <div class="panel diag-zone" id="diagBox">
      <div class="profile-col"><img src="img/profile.jpg" alt=""></div>
      <div class="diag-inner">
        <div id="speakerName">KARDIA</div>
        <div id="dialogueText">…</div>
        <div class="tap-cue">TAP TO CONTINUE</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const STORY = [
  {
    chapter: "CHAPTER 1 : The Signal",
    quest:   "Something is trying to reach you.\nFind a cell phone.",
    target:  "cell phone",
    holdSec: 2.5,
    intro:   ["Hello...Anyone there?", "I am glad you could make it here.", "Could I get some signal here? Would you mind putting your phone into view?"],
    capture: ["Great! Thank you.", "...", "There. Did you feel any pulse?"]
  },
  {
    chapter: "CHAPTER 2 : The Mark",
    quest:   "A book as the guide?.\nFind a book.",
    target:  "book",
    holdSec: 2.5,
    intro:   ["Concerning...", "The signal is not the best here..", "Why not try looking into a book for any information. Could you show it steady in your sight?"],
    capture: ["Yes. That is the one!", "Where would I be without you!", "In the meantime I shall look into this..."]
  },
  {
    chapter: "CHAPTER 3 : The Vessel",
    quest:   "Quench my thirst.\nFind a cup.",
    target:  "cup",
    holdSec: 2.5,
    intro:   ["Great seems we are on the right track.", "Phew.. though I am feeling quite thirsty", "Will you be so kind and share a cup of water with me?"],
    capture: ["Yes. I am feeling much better", "We work well as a team", "Let us keep going!"]
  }
];

let model = null, chapter = 0, introIdx = 0;
let isCapturing = false, holdStart = null, typeTimer = null;
let running = false; // guard against concurrent detect calls

const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const questEl   = document.getElementById('questText');

// ── DITHER SETUP ──
// Offscreen canvas for pixel-level processing
const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d', { willReadFrequently: true });

// Scale factor — higher = more legible, less chunky
const DITHER_SCALE = 0.42;

// 4×4 Bayer ordered dither matrix (values 0–15)
const BAYER = [
   0,  8,  2, 10,
  12,  4, 14,  6,
   3, 11,  1,  9,
  15,  7, 13,  5
];

// Two-tone palette — softened dark so contrast is readable not harsh
const DARK  = [52,  95, 145];
const LIGHT = [218, 238, 252];

function applyDither() {
  const w = Math.max(1, Math.floor(canvas.width  * DITHER_SCALE));
  const h = Math.max(1, Math.floor(canvas.height * DITHER_SCALE));
  if (offscreen.width !== w)  offscreen.width  = w;
  if (offscreen.height !== h) offscreen.height = h;

  // Replicate CSS object-fit:cover so the dithered frame isn't stretched
  const vw = video.videoWidth, vh = video.videoHeight;
  const scale = Math.max(w / vw, h / vh);
  const sw = vw * scale, sh = vh * scale;
  const ox = (w - sw) / 2, oy = (h - sh) / 2;
  offCtx.drawImage(video, ox, oy, sw, sh);
  const imgData = offCtx.getImageData(0, 0, w, h);
  const d = imgData.data;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      // Perceptual luminance
      const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      // Bayer threshold 0–255
      const threshold = (BAYER[(y % 4) * 4 + (x % 4)] / 15) * 255;
      const col = lum > threshold ? LIGHT : DARK;
      d[i]   = col[0];
      d[i+1] = col[1];
      d[i+2] = col[2];
      d[i+3] = 255;
    }
  }

  offCtx.putImageData(imgData, 0, 0);

  // Scale back up sharp (no smoothing = chunky pixels)
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);
}

// ── VCR SWEEP EFFECT ──
let vcrStart = null;
const VCR_DURATION = 950;

function triggerVCR() { vcrStart = performance.now(); }

function drawVCR() {
  if (!vcrStart) return;
  const elapsed = performance.now() - vcrStart;
  if (elapsed > VCR_DURATION) { vcrStart = null; return; }

  const t = elapsed / VCR_DURATION;
  const w = canvas.width, h = canvas.height;
  ctx.save();

  // ── Initial white flash ──
  if (elapsed < 100) {
    ctx.fillStyle = `rgba(255,255,255,${0.7 * (1 - elapsed / 100)})`;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
    return;
  }

  // ── Bright scanline band sweeping down ──
  const scanY = t * h;
  const grad = ctx.createLinearGradient(0, scanY - 28, 0, scanY + 28);
  grad.addColorStop(0,   'rgba(255,255,255,0)');
  grad.addColorStop(0.3, 'rgba(218,238,252,0.55)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.85)');
  grad.addColorStop(0.7, 'rgba(218,238,252,0.55)');
  grad.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, scanY - 28, w, 56);

  // ── Glitch lines — random horizontal slices with pink tint ──
  const glitchCount = Math.floor(4 * (1 - t));
  for (let i = 0; i < glitchCount; i++) {
    const gy     = Math.random() * scanY;
    const gh     = Math.random() * 3 + 1;
    const offset = (Math.random() - 0.5) * 18;
    ctx.fillStyle = `rgba(176,122,138,${Math.random() * 0.45})`;
    ctx.fillRect(offset, gy, w, gh);
  }

  // ── Subtle blue overlay on already-scanned area ──
  ctx.fillStyle = `rgba(126,192,232,${0.12 * (1 - t)})`;
  ctx.fillRect(0, 0, w, scanY);

  // ── Thin repeating scanlines on the whole frame ──
  ctx.fillStyle = `rgba(0,0,0,${0.06 * (1 - t)})`;
  for (let y = 0; y < h; y += 4) ctx.fillRect(0, y, w, 1);

  ctx.restore();
}
const chapterEl = document.getElementById('chapterBar');
const diagEl    = document.getElementById('dialogueText');
const speakerEl = document.getElementById('speakerName');
const holdLabel = document.getElementById('holdLabel');

// ── DITHER BACKGROUND GRADIENT ──
// Uses the gradient's own colour range: dark stop → light stop
const BG_DARK  = [126, 192, 232]; // #7ec0e8
const BG_LIGHT = [247, 252, 255]; // #f7fcff

function ditherBackground() {
  const bgCanvas = document.getElementById('bg-canvas');
  const W = window.innerWidth, H = window.innerHeight;
  const w = Math.max(1, Math.floor(W * DITHER_SCALE));
  const h = Math.max(1, Math.floor(H * DITHER_SCALE));

  // Draw the gradient at reduced resolution
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tc = tmp.getContext('2d', { willReadFrequently: true });
  const grad = tc.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0,    '#7ec0e8');
  grad.addColorStop(0.30, '#d5eaf6');
  grad.addColorStop(0.65, '#eff8ff');
  grad.addColorStop(1,    '#f7fcff');
  tc.fillStyle = grad;
  tc.fillRect(0, 0, w, h);

  const imgData = tc.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const threshold = (BAYER[(y % 4) * 4 + (x % 4)] / 15) * 255;
      const col = lum > threshold ? BG_LIGHT : BG_DARK;
      d[i] = col[0]; d[i+1] = col[1]; d[i+2] = col[2]; d[i+3] = 255;
    }
  }
  tc.putImageData(imgData, 0, 0);

  // Scale up sharp to full screen
  bgCanvas.width  = W;
  bgCanvas.height = H;
  const bc = bgCanvas.getContext('2d');
  bc.imageSmoothingEnabled = false;
  bc.drawImage(tmp, 0, 0, W, H);
}

window.addEventListener('load',   ditherBackground);
window.addEventListener('resize', ditherBackground);

// ── DITHER STATIC IMAGES ──
function ditherImg(img) {
  const c  = document.createElement('canvas');
  c.width  = img.naturalWidth;
  c.height = img.naturalHeight;
  const cx = c.getContext('2d', { willReadFrequently: true });
  cx.drawImage(img, 0, 0);
  const imgData = cx.getImageData(0, 0, c.width, c.height);
  const d = imgData.data;
  for (let y = 0; y < c.height; y++) {
    for (let x = 0; x < c.width; x++) {
      const i = (y * c.width + x) * 4;
      if (d[i+3] === 0) continue; // keep transparent pixels untouched
      const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const threshold = (BAYER[(y % 4) * 4 + (x % 4)] / 15) * 255;
      const col = lum > threshold ? LIGHT : DARK;
      d[i] = col[0]; d[i+1] = col[1]; d[i+2] = col[2];
      // d[i+3] left as-is to preserve original alpha
    }
  }
  cx.putImageData(imgData, 0, 0);
  img.src = c.toDataURL();
}

window.addEventListener('load', () => {
  document.querySelectorAll('img').forEach(img => {
    if (img.complete && img.naturalWidth > 0) ditherImg(img);
    else img.addEventListener('load', () => ditherImg(img));
  });
});

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('s-title').addEventListener('click', boot);

async function boot() {
  showScreen('s-loading');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    video.srcObject = stream;
    await video.play();

    // Load model
    model = await cocoSsd.load({ base: 'mobilenet_v2' });

    resizeCanvas();
    loadChapter(0);
    showScreen('s-game');

    // Start the loop ONCE
    loop();
  } catch(e) {
    console.error(e);
    document.querySelector('#s-loading .load-lbl').textContent = 'Error: ' + e.message;
  }
}

// ── DETECT LOOP — rAF called at END so no concurrent detections ──
async function loop() {
  if (model && video.readyState >= 2 && video.videoWidth > 0) {
    resizeCanvas();
    try {
      const preds = await model.detect(video);

      // Dithered video frame as background, then boxes on top
      applyDither();

      const ch  = STORY[chapter];
      const hit = preds.find(p => p.class === ch.target && p.score > 0.3);

      // Draw ALL detections with labels
      preds.forEach(p => drawBox(p, p.class === ch.target));

      // VCR sweep overlay
      drawVCR();

      // Debug counter top-left
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText(`${preds.length} object${preds.length !== 1 ? 's' : ''} detected`, 10, 20);

      if (!isCapturing) {
        if (hit) {
          if (!holdStart) holdStart = performance.now();
          const prog = Math.min((performance.now() - holdStart) / (ch.holdSec * 1000), 1);
          holdLabel.classList.add('show');
          drawArc(hit, prog);
          if (prog >= 1) triggerCapture(ch);
        } else {
          holdStart = null;
          holdLabel.classList.remove('show');
        }
      }
    } catch(e) {
      console.warn('Detection error:', e);
    }
  }
  // Schedule NEXT frame only after this one is fully done
  requestAnimationFrame(loop);
}

// ── CHAPTERS ──
function loadChapter(i) {
  chapter = i; introIdx = 0; isCapturing = false; holdStart = null;
  holdLabel.classList.remove('show');
  const ch = STORY[i];

  // Fade out → update text → fade in
  chapterEl.classList.add('fade');
  setTimeout(() => {
    chapterEl.textContent = ch.chapter;
    chapterEl.classList.remove('fade');
  }, 600);

  questEl.textContent = '';
  const isOnlyLine = ch.intro.length === 1;
  type(ch.intro[0], 'KARDIA', isOnlyLine ? revealQuest : null);
}

function revealQuest() {
  questEl.textContent = STORY[chapter].quest;
}

function type(text, speaker = 'KARDIA', onDone = null) {
  if (typeTimer) clearInterval(typeTimer);
  speakerEl.textContent = speaker;
  diagEl.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    diagEl.textContent += text[i++];
    if (i >= text.length) {
      clearInterval(typeTimer);
      if (onDone) onDone();
    }
  }, 38);
}

document.getElementById('diagBox').addEventListener('click', () => {
  if (isCapturing) return;
  const next = Math.min(introIdx + 1, STORY[chapter].intro.length - 1);
  if (next !== introIdx) {
    introIdx = next;
    const isLast = introIdx === STORY[chapter].intro.length - 1;
    type(STORY[chapter].intro[introIdx], 'KARDIA', isLast ? revealQuest : null);
  }
});

function triggerCapture(ch) {
  isCapturing = true;
  holdLabel.classList.remove('show');
  triggerVCR();
  questEl.textContent = '✦  CAPTURED';
  let i = 0;
  type(ch.capture[0]);
  const iv = setInterval(() => {
    i++;
    if (i < ch.capture.length) {
      type(ch.capture[i]);
    } else {
      clearInterval(iv);
      setTimeout(() => {
        if (chapter + 1 < STORY.length) {
          loadChapter(chapter + 1);
        } else {
          chapterEl.textContent = '— FIN —';
          questEl.textContent   = 'You have seen everything there is to see.';
          type('This is where the story rests.\nFor now.');
        }
      }, 2800);
    }
  }, 2800);
}

// ── CANVAS ──
function resizeCanvas() {
  if (canvas.offsetWidth  !== canvas.width)  canvas.width  = canvas.offsetWidth;
  if (canvas.offsetHeight !== canvas.height) canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

// ── DRAWING ──
function project(bbox) {
  const [x, y, w, h] = bbox;
  const s  = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
  const ox = (canvas.width  - video.videoWidth  * s) / 2;
  const oy = (canvas.height - video.videoHeight * s) / 2;
  return { x: x*s+ox, y: y*s+oy, w: w*s, h: h*s };
}

function drawBox(pred, isTarget) {
  const { x, y, w, h } = project(pred.bbox);
  const col  = isTarget ? '#7ab3d4' : 'rgba(255,255,255,0.7)';
  const tick = isTarget ? 14 : 10;
  ctx.strokeStyle = col;
  ctx.lineWidth   = isTarget ? 2 : 1.5;
  ctx.shadowColor = col;
  ctx.shadowBlur  = isTarget ? 10 : 0;
  [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([cx,cy,dx,dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx+dx*tick, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy+dy*tick);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  // Label on EVERY detection
  const label = `${pred.class}  ${Math.round(pred.score * 100)}%`;
  ctx.font = `${isTarget ? 'bold ' : ''}12px monospace`;
  const tw = ctx.measureText(label).width;
  const lx = x, ly = y > 20 ? y - 6 : y + h + 16;

  // Background pill for readability
  ctx.fillStyle = isTarget ? 'rgba(122,179,212,0.85)' : 'rgba(0,0,0,0.5)';
  ctx.fillRect(lx, ly - 13, tw + 8, 17);

  ctx.fillStyle = '#ffffff';
  ctx.fillText(label, lx + 4, ly);
}

function drawArc(pred, progress) {
  const { x, y, w, h } = project(pred.bbox);
  const cx = x+w/2, cy = y+h/2, r = Math.max(w,h)*0.56;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(122,179,212,0.2)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
  ctx.strokeStyle = '#7ab3d4';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#7ab3d4';
  ctx.shadowBlur = 14;
  ctx.stroke();
  ctx.shadowBlur = 0;
}
</script>
