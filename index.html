<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HASKELL\SPOT</title>
<link rel="stylesheet" href="https://use.typekit.net/mjw2tfe.css">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --lime:#C8F95A; --ink:#0A0A0A; --paper:#F5F5F0; --danger:#ff4d4d;
    --display: "patriot", 'Helvetica Neue', 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; background:var(--ink); color:var(--paper);
    font-family:var(--display); overflow:hidden; -webkit-tap-highlight-color:transparent; }
  button { font-family:inherit; }
  .stage { position:fixed; inset:0; }
  .cam-wrap { position:absolute; inset:0; overflow:hidden; background:#111; }
  video, canvas.detect, canvas.capture {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  canvas.detect, canvas.capture { pointer-events:none; }
  canvas.capture { display:none; z-index:5; }
  .hud { position:absolute; inset:0; pointer-events:none; z-index:10; }
  .frame { position:absolute; top:14px; left:14px; right:14px; bottom:14px; border:2px solid var(--lime); }
  .brand { position:absolute; top:26px; left:28px; z-index:11; }
  .brand-name { font-family:var(--display); font-weight:700; font-size:24px;
    letter-spacing:0.01em; color:var(--paper); line-height:1; }
  .brand-sub { display:flex; gap:4px; margin-top:6px;
    font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:0.18em; }
  .brand-sub span { padding:2px 6px; color:var(--paper); }
  .brand-sub span.on { background:var(--lime); color:var(--ink); }
  .label { position:absolute; background:var(--lime); color:var(--ink); padding:10px 14px;
    font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:0.1em;
    text-transform:uppercase; line-height:1.35; pointer-events:none; z-index:11; }
  .label.target { top:90px; left:28px; max-width:80%; }
  .label.target .small { font-size:10px; opacity:0.7; display:block; margin-bottom:3px; }
  .label.target .big { font-size:18px; font-weight:900; letter-spacing:0.04em; line-height:1.2; }
  .label.target.prompt .big { font-size:15px; letter-spacing:0.02em; line-height:1.35; text-transform:none; }
  .label.meta { top:26px; right:28px; writing-mode:vertical-rl; transform:rotate(180deg); padding:12px 8px; }
  .label.status { bottom:130px; left:28px; max-width:75%; }
  .actions { position:absolute; left:28px; right:28px; bottom:28px;
    display:flex; gap:10px; z-index:12; pointer-events:auto; }
  .btn { flex:1; background:var(--lime); color:var(--ink); border:none; padding:16px 14px;
    font-family:var(--mono); font-weight:800; font-size:13px; letter-spacing:0.12em;
    text-transform:uppercase; cursor:pointer; transition:transform .08s ease; }
  .btn:active { transform:scale(0.97); }
  .btn.ghost { background:transparent; color:var(--lime); border:2px solid var(--lime);
    flex:0 0 56px; padding:16px 0; font-size:18px; }
  .btn.ink { background:var(--ink); color:var(--lime); border:2px solid var(--lime); }
  .shutter-wrap {
    position:absolute; left:28px; right:28px; bottom:28px;
    display:flex; align-items:center; justify-content:center; gap:14px;
    z-index:12; pointer-events:auto; }
  .shutter {
    width:78px; height:78px; border-radius:50%;
    background:var(--lime); border:4px solid var(--ink);
    box-shadow:0 0 0 3px var(--lime);
    cursor:pointer; transition:transform .08s ease; }
  .shutter:active { transform:scale(0.92); }
  .icon-btn {
    width:52px; height:52px; border-radius:50%;
    background:transparent; color:var(--lime); border:2px solid var(--lime);
    font-family:var(--mono); font-weight:800; font-size:18px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .icon-btn:active { transform:scale(0.95); }
  .score { position:absolute; bottom:118px; right:28px; background:var(--ink);
    color:var(--lime); border:2px solid var(--lime); padding:10px 14px;
    font-family:var(--mono); font-weight:800; font-size:13px; letter-spacing:0.1em;
    z-index:11; display:none; }
  .screen {
    position:absolute; inset:0; background:var(--ink); z-index:50;
    display:none; flex-direction:column; padding:32px 28px; overflow-y:auto; }
  .screen.active { display:flex; }
  .screen-top { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .screen-mid { flex:1; display:flex; flex-direction:column; justify-content:center; gap:24px; padding:32px 0; }
  .screen-foot { flex:0 0 auto; display:flex; justify-content:space-between;
    font-family:var(--mono); font-size:10.5px; letter-spacing:0.12em;
    color:var(--paper); opacity:0.5; padding-top:24px; }
  .splash h1 { font-family:var(--display); font-size:clamp(44px,11vw,96px);
    line-height:0.92; font-weight:700; letter-spacing:-0.01em; color:var(--paper); }
  .splash h1 .accent { background:var(--lime); color:var(--ink); padding:0 10px; display:inline-block; }
  .splash p { font-family:var(--mono); font-size:12.5px; line-height:1.65;
    color:var(--paper); letter-spacing:0.05em; max-width:460px; }
  .mode-grid { display:grid; gap:14px; grid-template-columns:1fr 1fr; margin-top:8px; }
  @media (max-width:560px) { .mode-grid { grid-template-columns:1fr; } }
  .mode-card {
    background:transparent; border:2px solid var(--lime);
    padding:22px 22px 20px; color:var(--paper);
    text-align:left; cursor:pointer;
    display:flex; flex-direction:column; gap:14px;
    min-height:180px; transition:background .15s ease; }
  .mode-card:hover, .mode-card:focus { background:rgba(200,249,90,0.08); }
  .mode-card .mode-tag { font-family:var(--mono); font-size:10px; font-weight:700;
    letter-spacing:0.18em; color:var(--lime); }
  .mode-card .mode-name { font-family:var(--display); font-size:32px; font-weight:700;
    line-height:0.95; color:var(--paper); letter-spacing:-0.01em; }
  .mode-card .mode-desc { font-family:var(--mono); font-size:11.5px; line-height:1.55;
    color:var(--paper); letter-spacing:0.04em; opacity:0.85; }
  .mode-card .mode-go { font-family:var(--mono); font-size:12px; font-weight:800;
    letter-spacing:0.14em; color:var(--lime); margin-top:auto; text-transform:uppercase; }

  .error-msg { background:var(--danger); color:white; padding:12px 14px;
    font-family:var(--mono); font-size:11px; letter-spacing:0.06em; line-height:1.5;
    margin-top:8px; display:none; max-width:460px; }
  .flash { position:absolute; inset:0; background:var(--lime); opacity:0;
    pointer-events:none; z-index:20; transition:opacity .4s ease; }
  .flash.on { opacity:0.55; transition:opacity .05s; }
  .flash.white { background:#ffffff; }
  .preview-wrap {
    position:absolute; inset:0; background:var(--ink); z-index:55;
    display:none; flex-direction:column; }
  .preview-wrap.active { display:flex; }
  .preview-img {
    flex:1; min-height:0; background:#000 center/contain no-repeat;
    border:2px solid var(--lime); margin:14px; }
  .preview-bar { padding:20px 28px 28px; display:flex; gap:10px; }

  .presenting-pill {
    position:fixed; top:14px; left:50%;
    transform:translateX(-50%);
    background:var(--lime); color:var(--ink);
    padding:6px 12px; z-index:200;
    font-family:var(--mono); font-size:10px; font-weight:800;
    letter-spacing:0.18em; display:none; }
  .presenting-pill.on { display:block; }
  .presenting-pill::before {
    content:''; display:inline-block; width:6px; height:6px;
    background:var(--ink); border-radius:50%; margin-right:6px;
    animation:ppulse 1.6s ease-in-out infinite; }
  @keyframes ppulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  @media (max-width:480px) {
    .brand { top:22px; left:22px; }
    .label.target { top:82px; left:22px; }
    .label.meta { top:22px; right:22px; }
    .label.status { bottom:120px; left:22px; }
    .actions, .shutter-wrap { left:22px; right:22px; bottom:22px; }
    .score { right:22px; bottom:110px; }
    .screen { padding:24px 22px; }
  }
</style>
</head>
<body>
<div class="stage">

  <div class="presenting-pill" id="presentingPill">PRESENTING / LIVE</div>

  <div class="screen splash active" id="screenSplash">
    <div class="screen-top">
      <div class="brand-name">HASKELL\</div>
      <div class="brand-sub"><span>S</span><span class="on">P</span><span>O</span><span>T</span></div>
    </div>
    <div class="screen-mid">
      <h1>FIND IT,<br>SHOW IT,<br><span class="accent">SCORE.</span></h1>
      <p>TWO WAYS TO PLAY. RACE A TIMER OR ANSWER A PROMPT — YOUR CAMERA NEVER LEAVES THIS DEVICE.</p>
      <div class="mode-grid">
        <button class="mode-card" id="modeSpot">
          <div class="mode-tag">MODE 01</div>
          <div class="mode-name">QUICK<br>SPOT</div>
          <div class="mode-desc">Random object. 30-second timer. Camera detects when you find it.</div>
          <div class="mode-go">START →</div>
        </button>
        <button class="mode-card" id="modeShow">
          <div class="mode-tag">MODE 02</div>
          <div class="mode-name">SHOW<br>ME</div>
          <div class="mode-desc">A photo prompt. You compose, you capture, it goes elsewhere.</div>
          <div class="mode-go">START →</div>
        </button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="screen-foot"><span>MODEL/COCO-SSD</span><span>V0.5</span></div>
  </div>

  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas class="detect" id="overlay"></canvas>
    <canvas class="capture" id="capture"></canvas>
  </div>

  <div class="flash" id="flash"></div>

  <div class="hud" id="hud" style="display:none;">
    <div class="frame"></div>
    <div class="brand">
      <div class="brand-name">HASKELL\</div>
      <div class="brand-sub"><span>S</span><span class="on">P</span><span>O</span><span>T</span></div>
    </div>
    <div class="label target" id="targetCard">
      <span class="small" id="targetSmall">FIND/</span>
      <span class="big" id="targetLabel">LOADING...</span>
    </div>
    <div class="label meta" id="metaLabel">ROUND 01 / 00:30</div>
    <div class="label status" id="statusLabel">POINT CAMERA AT THE OBJECT</div>
    <div class="score" id="scoreChip">SCORE 0</div>

    <div class="actions" id="actionsSpot" style="display:none;">
      <button class="btn" id="skipBtn">SKIP TARGET →</button>
      <button class="btn ghost" id="quitBtn">×</button>
    </div>

    <div class="shutter-wrap" id="actionsShow" style="display:none;">
      <button class="icon-btn" id="newPromptBtn" title="New prompt">↻</button>
      <button class="shutter" id="shutterBtn" aria-label="Capture"></button>
      <button class="icon-btn" id="quitBtn2" title="Quit">×</button>
    </div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="screen-top" style="padding:24px 28px 0;">
      <div class="brand-name">HASKELL\</div>
      <div class="brand-sub"><span>S</span><span class="on">P</span><span>O</span><span>T</span></div>
    </div>
    <div class="preview-img" id="previewImg"></div>
    <div class="preview-bar">
      <button class="btn ink" id="retakeBtn">↻ RETAKE</button>
      <button class="btn" id="keepBtn">KEEP →</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
// Presenter pairing: if URL has ?session=XXXX, connect to that presenter
const _sessionCode = new URLSearchParams(window.location.search).get('session');
let _presenterConn = null;

if (_sessionCode) {
  const tryConnect = () => {
    if (typeof Peer === 'undefined') { setTimeout(tryConnect, 200); return; }
    const peer = new Peer();
    peer.on('open', () => {
      _presenterConn = peer.connect('haskell-spot-' + _sessionCode.toLowerCase());
      _presenterConn.on('open', () => {
        document.getElementById('presentingPill').classList.add('on');
      });
      _presenterConn.on('close', () => {
        document.getElementById('presentingPill').classList.remove('on');
      });
    });
    peer.on('error', e => console.warn('peer', e));
  };
  tryConnect();
}

const FINDABLE = ['bottle','cup','book','cell phone','laptop','keyboard','mouse',
  'chair','couch','bed','dining table','tv','remote','clock','backpack','handbag','tie',
  'banana','apple','orange','sandwich','pizza','donut','cake','fork','knife','spoon','bowl',
  'wine glass','potted plant','vase','scissors','teddy bear','toothbrush','person'];

const PROMPTS = [
  'The oldest thing in your fridge',
  "A book you swore you'd finish",
  'Your most-used mug',
  "Something on your desk that doesn't belong there",
  'The weirdest thing in your junk drawer',
  "A gift you'd never have bought yourself",
  'The most expensive thing you never use',
  "The plant you're slowly killing",
  'Exercise equipment used as furniture',
  'Something you bought because of an ad',
  'A "someday" project, still waiting',
  'The thing you keep meaning to throw out',
  'Your most recent impulse buy',
  'Your view, no editing',
  "What's in your dominant hand",
  "The shoes you're wearing today",
  "The first thing you'll touch when you stand up",
  "Three things within arm's reach",
  "What's playing right now",
  "Something with handwriting that isn't yours",
  'A photo of a photo',
  'A souvenir you actually look at',
  'Something packed for a trip, never unpacked',
  'The most-touched object in your home',
  "Something that's been with you in 3 places",
  'A handed-down object',
  'Your morning routine, one frame',
  'Your messiest drawer',
  "Something blue (let's see if we agree)",
  'Your comfort food, plated honestly',
  "What you'd cook for them tonight",
  'Your phone lock screen',
  'A texture you love',
  'A really good dog you saw today',
  'The best window within a block',
  'Something that made you stop walking',
  'Sky check, right now',
  'The most interesting trash',
  "A sign that's wrong in a funny way"
];

let mode=null, model=null, stream=null, video, overlay, ctx, capCanvas, capCtx;
let currentTarget=null;
let score=0, round=0, timer=30, captures=0;
let timerInterval=null, rafId=null;
let gameRunning=false, foundLock=false;
let lastBlob=null, lastDataUrl=null, lastPrompt=null;

const $ = id => document.getElementById(id);
const elError=$('errorMsg'), elFlash=$('flash');
const elHud=$('hud'), elTarget=$('targetLabel'), elTargetSmall=$('targetSmall'),
      elTargetCard=$('targetCard'), elMeta=$('metaLabel'),
      elStatus=$('statusLabel'), elScore=$('scoreChip');
const elActionsSpot=$('actionsSpot'), elActionsShow=$('actionsShow');
const elPreview=$('previewWrap'), elPreviewImg=$('previewImg');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = $('screen' + id.charAt(0).toUpperCase() + id.slice(1));
  if (target) target.classList.add('active');
}

$('modeSpot').addEventListener('click', startSpotMode);
$('modeShow').addEventListener('click', startShowMode);

async function ensureCamera() {
  if (stream) return;
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} },
    audio:false
  });
  video=$('video'); overlay=$('overlay'); ctx=overlay.getContext('2d');
  capCanvas=$('capture'); capCtx=capCanvas.getContext('2d');
  video.srcObject=stream;
  await new Promise(r => video.onloadedmetadata=r);
  await video.play();
  overlay.width=capCanvas.width=video.videoWidth;
  overlay.height=capCanvas.height=video.videoHeight;
}
async function ensureModel() {
  if (model) return;
  model = await cocoSsd.load({ base:'lite_mobilenet_v2' });
}
function showError(err) {
  elError.style.display='block';
  if (err.name==='NotAllowedError') elError.textContent='CAMERA ACCESS DENIED. ALLOW CAMERA AND TRY AGAIN.';
  else if (err.name==='NotFoundError') elError.textContent='NO CAMERA DETECTED ON THIS DEVICE.';
  else if (err.name==='NotReadableError') elError.textContent='CAMERA IN USE BY ANOTHER APP.';
  else elError.textContent='ERROR: '+(err.message||err.name||'UNKNOWN');
}

async function startSpotMode() {
  elError.style.display='none';
  $('modeSpot').disabled=true;
  try {
    await ensureCamera();
    await ensureModel();
    mode='spot';
    showScreen('none');
    elHud.style.display='block';
    elActionsSpot.style.display='flex';
    elActionsShow.style.display='none';
    elScore.style.display='block';
    elTargetSmall.textContent='FIND/';
    elTargetCard.classList.remove('prompt');
    score=0; round=0;
    gameRunning=true;
    nextSpotRound(false);
    detect();
  } catch (err) { console.error(err); showError(err); $('modeSpot').disabled=false; }
}

function nextSpotRound(success) {
  round++; if (success) score++;
  let next; do { next = FINDABLE[Math.floor(Math.random()*FINDABLE.length)]; }
  while (next===currentTarget);
  currentTarget=next;
  elTarget.textContent=currentTarget.toUpperCase();
  elScore.textContent='SCORE '+score;
  elStatus.textContent='POINT CAMERA AT THE OBJECT';
  timer=30;
  if (timerInterval) clearInterval(timerInterval);
  updateMeta();
  timerInterval=setInterval(() => {
    timer--; updateMeta();
    if (timer<=0) {
      clearInterval(timerInterval);
      elStatus.textContent='TIME UP — NEW TARGET';
      setTimeout(() => nextSpotRound(false), 700);
    }
  }, 1000);
}
function updateMeta() {
  if (mode==='spot') {
    const r=String(round).padStart(2,'0'), t=String(Math.max(0,timer)).padStart(2,'0');
    elMeta.textContent=`ROUND ${r} / 00:${t}`;
  } else if (mode==='show') {
    elMeta.textContent=`SHOW ME / ${String(captures).padStart(2,'0')} CAPTURED`;
  }
}
async function detect() {
  if (!gameRunning || mode!=='spot') return;
  try {
    const preds = await model.detect(video);
    drawDetections(preds);
    const found = preds.find(p => p.class===currentTarget && p.score>=0.55);
    if (found && !foundLock) onFound();
  } catch (e) { console.error('detect error', e); }
  rafId=requestAnimationFrame(detect);
}
function drawDetections(preds) {
  ctx.clearRect(0,0,overlay.width,overlay.height);
  preds.forEach(p => {
    const [x,y,w,h]=p.bbox;
    const isTarget=p.class===currentTarget;
    ctx.lineWidth=3;
    ctx.strokeStyle=isTarget?'#C8F95A':'rgba(255,255,255,0.55)';
    ctx.strokeRect(x,y,w,h);
    const label=`${p.class.toUpperCase()} ${(p.score*100).toFixed(0)}%`;
    ctx.font='600 14px monospace';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle=isTarget?'#C8F95A':'rgba(0,0,0,0.7)';
    ctx.fillRect(x,y-22,tw+12,22);
    ctx.fillStyle=isTarget?'#0A0A0A':'#ffffff';
    ctx.fillText(label,x+6,y-6);
  });
}
function onFound() {
  foundLock=true;
  elFlash.classList.add('on');
  elStatus.textContent='FOUND ✓ +1 POINT';
  setTimeout(() => elFlash.classList.remove('on'), 200);
  setTimeout(() => { foundLock=false; nextSpotRound(true); }, 1100);
}
$('skipBtn').addEventListener('click', () => nextSpotRound(false));
$('quitBtn').addEventListener('click', quitGame);

async function startShowMode() {
  elError.style.display='none';
  try {
    await ensureCamera();
    mode='show';
    captures=0;
    showScreen('none');
    elHud.style.display='block';
    elActionsSpot.style.display='none';
    elActionsShow.style.display='flex';
    elScore.style.display='none';
    if (rafId) cancelAnimationFrame(rafId);
    if (timerInterval) clearInterval(timerInterval);
    if (ctx) ctx.clearRect(0,0,overlay.width,overlay.height);
    elTargetSmall.textContent='PROMPT/';
    elTargetCard.classList.add('prompt');
    elStatus.textContent='COMPOSE — TAP THE GREEN BUTTON';
    nextPrompt();
  } catch (err) { console.error(err); showError(err); showScreen('splash'); }
}
function nextPrompt() {
  let p; do { p = PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
  while (p===currentTarget && PROMPTS.length>1);
  currentTarget=p;
  elTarget.textContent=p;
  updateMeta();
}
$('newPromptBtn').addEventListener('click', nextPrompt);
$('quitBtn2').addEventListener('click', quitGame);
$('shutterBtn').addEventListener('click', capture);

function capture() {
  if (!video || !capCtx) return;
  elFlash.classList.add('white','on');
  setTimeout(() => elFlash.classList.remove('on'), 120);
  setTimeout(() => elFlash.classList.remove('white'), 400);

  capCtx.drawImage(video, 0, 0, capCanvas.width, capCanvas.height);

  const W=capCanvas.width, H=capCanvas.height;
  const pad=Math.round(W*0.025);
  capCtx.fillStyle='#F5F5F0';
  capCtx.font=`700 ${Math.round(W*0.034)}px "patriot", Helvetica, sans-serif`;
  capCtx.fillText('HASKELL\\', pad+4, pad+Math.round(W*0.034));

  const promptText=currentTarget;
  const labelFontSize=Math.round(W*0.022);
  capCtx.font=`700 ${labelFontSize}px "JetBrains Mono", monospace`;
  const labelPadX=Math.round(W*0.018), labelPadY=Math.round(W*0.014);
  const maxLineW=W*0.78;
  const words=promptText.split(' ');
  const lines=[]; let line='';
  words.forEach(w => {
    const test=line?line+' '+w:w;
    if (capCtx.measureText(test).width>maxLineW && line) { lines.push(line); line=w; }
    else line=test;
  });
  if (line) lines.push(line);
  const lineH=labelFontSize*1.35;
  const headFontSize=Math.round(W*0.013);
  const boxH=lines.length*lineH + labelPadY*2 + Math.round(W*0.015);
  const boxY=H-pad-boxH;
  let maxW=0;
  lines.forEach(l => { const w=capCtx.measureText(l).width; if (w>maxW) maxW=w; });
  const boxW=Math.min(W-pad*2, maxW+labelPadX*2);
  capCtx.fillStyle='#C8F95A';
  capCtx.fillRect(pad, boxY, boxW, boxH);
  capCtx.fillStyle='#0A0A0A';
  capCtx.font=`700 ${headFontSize}px "JetBrains Mono", monospace`;
  capCtx.fillText('PROMPT/', pad+labelPadX, boxY+labelPadY+headFontSize);
  capCtx.font=`700 ${labelFontSize}px "JetBrains Mono", monospace`;
  lines.forEach((l, i) => {
    capCtx.fillText(l, pad+labelPadX,
      boxY+labelPadY+headFontSize+Math.round(W*0.015)+(i+1)*lineH-labelFontSize*0.25);
  });

  lastPrompt = currentTarget;
  capCanvas.toBlob(blob => {
    if (!blob) return;
    lastBlob = blob;
    lastDataUrl = capCanvas.toDataURL('image/jpeg', 0.85);
    const url = URL.createObjectURL(blob);
    elPreviewImg.style.backgroundImage = `url(${url})`;
    elPreview.classList.add('active');
  }, 'image/jpeg', 0.9);
}

$('retakeBtn').addEventListener('click', () => {
  elPreview.classList.remove('active');
  lastBlob = null; lastDataUrl = null; lastPrompt = null;
});

$('keepBtn').addEventListener('click', () => {
  if (!lastDataUrl) return;
  // Send to presenter if connected
  if (_presenterConn && _presenterConn.open) {
    _presenterConn.send({
      type: 'photo',
      dataUrl: lastDataUrl,
      prompt: lastPrompt,
      timestamp: Date.now()
    });
  }
  captures++;
  updateMeta();
  elPreview.classList.remove('active');
  lastBlob = null; lastDataUrl = null; lastPrompt = null;
  nextPrompt();
});

function quitGame() {
  gameRunning=false;
  if (timerInterval) clearInterval(timerInterval);
  if (rafId) cancelAnimationFrame(rafId);
  if (ctx) ctx.clearRect(0,0,overlay.width,overlay.height);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream=null; }
  elHud.style.display='none';
  elActionsSpot.style.display='none';
  elActionsShow.style.display='none';
  elScore.style.display='none';
  elPreview.classList.remove('active');
  $('modeSpot').disabled=false;
  showScreen('splash');
}

window.addEventListener('resize', () => {
  if (video && overlay && video.videoWidth) {
    overlay.width=capCanvas.width=video.videoWidth;
    overlay.height=capCanvas.height=video.videoHeight;
  }
});
</script>
</body>
</html>
