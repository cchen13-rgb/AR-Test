<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kardia on Phone</title>
  <link rel="stylesheet" href="https://use.typekit.net/mjw2tfe.css">
  <style>
    :root {
      --sky:      #b8d8ee;
      --sky-mid:  #8fb8d8;
      --sky-deep: #6aa0c4;
      --cream:    #e8e2d6;
      --cream-lt: #f2ede4;
      --border:   rgba(90,140,175,0.42);
      --ink:      #3d6080;
      --ink-lt:   #6a90aa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "fayte-pixel", monospace;
      background: linear-gradient(180deg, #aacee8 0%, #c8dff2 50%, #b8cede 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── SCREEN SYSTEM ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.85s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── PHONE COLUMN ── */
    .layout {
      width: min(480px, 100vw);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TEXTURE PANELS ── */
    .tex {
      flex-shrink: 0;
      height: 26vh;
      max-height: 185px;
      border: 1px solid var(--border);
      background: var(--cream-lt);
      overflow: hidden;
    }
    .tex img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.52;
      mix-blend-mode: multiply;
    }
    .tex.flip { transform: scaleY(-1); }

    /* ════════════════════
       TITLE SCREEN
    ════════════════════ */
    .click-bar {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--cream-lt);
      padding: 14px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
      transition: background 0.18s;
    }
    .click-bar:hover { background: var(--cream); }
    .click-bar strong { font-size: 15px; letter-spacing: 1px; }

    .title-mid {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      gap: 2px;
    }

    .alt-tag {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--ink-lt);
      opacity: 0.55;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .big-title {
      font-family: "fayte-pixel", monospace;
      font-size: clamp(58px, 18.5vw, 90px);
      line-height: 0.88;
      color: var(--sky-mid);
      text-transform: uppercase;
      text-shadow: 3px 3px 0 rgba(61,96,128,0.15);
    }

    .on-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      width: 100%;
      justify-content: center;
    }
    .on-row span { font-size: 11px; letter-spacing: 6px; color: var(--ink-lt); opacity: 0.5; }
    .on-row::before, .on-row::after {
      content: '';
      flex: 1; max-width: 72px;
      height: 1px;
      background: var(--sky-deep);
      opacity: 0.28;
    }

    /* ════════════════════
       LOADING SCREEN
    ════════════════════ */
    .spacer {
      flex-shrink: 0;
      height: 50px;
      border: 1px solid var(--border);
      background: var(--sky);
    }

    .loading-mid {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    #compassSvg {
      animation: spin 5s linear infinite;
      transform-origin: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-lbl {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--ink-lt);
    }

    /* ════════════════════
       GAME SCREEN
    ════════════════════ */
    .quest-zone {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--sky);
      padding: 13px 15px;
      min-height: 94px;
    }
    .quest-eyebrow {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--ink);
      opacity: 0.42;
      margin-bottom: 7px;
    }
    #questText {
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--ink);
      line-height: 1.75;
      white-space: pre-line;
    }

    .chapter-strip {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--cream-lt);
      padding: 10px 16px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--ink);
    }

    .cam-zone {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      background: var(--sky-mid);
      position: relative;
      overflow: hidden;
    }
    .cam-zone video,
    .cam-zone canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #holdLabel {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      text-shadow: 0 0 10px var(--sky-deep);
    }
    #holdLabel.show { opacity: 0.9; }

    .diag-zone {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--cream);
      display: flex;
      min-height: 128px;
      max-height: 158px;
      cursor: pointer;
      user-select: none;
    }
    .profile-col {
      width: 108px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--sky);
      overflow: hidden;
    }
    .profile-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .diag-inner {
      flex: 1;
      padding: 13px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    #speakerName {
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--sky-deep);
      opacity: 0.7;
    }
    #dialogueText {
      font-size: 11px;
      letter-spacing: 0.4px;
      line-height: 1.8;
      color: var(--ink);
      flex: 1;
    }
    .tap-cue {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--ink);
      opacity: 0.22;
      text-align: right;
    }
  </style>
</head>
<body>

<!-- ════ TITLE ════ -->
<div class="screen active" id="s-title">
  <div class="layout">
    <div class="tex"><img src="img/texture.png" alt=""></div>
    <div class="click-bar" id="clickBar"><strong>CLICK</strong>&ensp;<small>ANYWHERE TO START</small></div>
    <div class="title-mid">
      <div class="alt-tag">Alternative Reality</div>
      <div class="big-title">KARDIA</div>
      <div class="on-row"><span>ON</span></div>
      <div class="big-title">PHONE</div>
    </div>
    <div class="tex flip"><img src="img/texture.png" alt=""></div>
  </div>
</div>

<!-- ════ LOADING ════ -->
<div class="screen" id="s-loading">
  <div class="layout">
    <div class="tex"><img src="img/texture.png" alt=""></div>
    <div class="spacer"></div>
    <div class="loading-mid">
      <svg id="compassSvg" width="138" height="138" viewBox="0 0 140 140"
           fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="70" cy="70" r="64" stroke="#6aa0c4" stroke-width="1.2"
                stroke-dasharray="3.5 3.5" opacity="0.62"/>
        <circle cx="70" cy="70" r="52" stroke="#6aa0c4" stroke-width="0.8" opacity="0.38"/>
        <g stroke="#6aa0c4" stroke-width="1.4" opacity="0.88">
          <line x1="70" y1="18" x2="70" y2="62"/>
          <line x1="70" y1="78" x2="70" y2="122"/>
          <line x1="18" y1="70" x2="62" y2="70"/>
          <line x1="78" y1="70" x2="122" y2="70"/>
          <line x1="25.4" y1="25.4" x2="57.6" y2="57.6"/>
          <line x1="82.4" y1="82.4" x2="114.6" y2="114.6"/>
          <line x1="114.6" y1="25.4" x2="82.4" y2="57.6"/>
          <line x1="57.6" y1="82.4" x2="25.4" y2="114.6"/>
        </g>
        <g stroke="#6aa0c4" stroke-width="0.9" opacity="0.48">
          <line x1="46.2" y1="20.0" x2="61.5" y2="63.5"/>
          <line x1="93.8" y1="20.0" x2="78.5" y2="63.5"/>
          <line x1="120.0" y1="46.2" x2="76.5" y2="61.5"/>
          <line x1="120.0" y1="93.8" x2="76.5" y2="78.5"/>
          <line x1="93.8" y1="120.0" x2="78.5" y2="76.5"/>
          <line x1="46.2" y1="120.0" x2="61.5" y2="76.5"/>
          <line x1="20.0" y1="93.8" x2="63.5" y2="78.5"/>
          <line x1="20.0" y1="46.2" x2="63.5" y2="61.5"/>
        </g>
        <circle cx="70" cy="70" r="9" stroke="#6aa0c4" stroke-width="0.8" opacity="0.38"/>
        <circle cx="70" cy="70" r="4" fill="#6aa0c4" opacity="0.78"/>
      </svg>
      <div class="load-lbl">Loading..</div>
    </div>
    <div class="tex flip"><img src="img/texture.png" alt=""></div>
  </div>
</div>

<!-- ════ GAME ════ -->
<div class="screen" id="s-game">
  <div class="layout">
    <div class="quest-zone">
      <div class="quest-eyebrow">QUEST OBJECTIVE</div>
      <div id="questText">Awaiting signal…</div>
    </div>
    <div class="chapter-strip" id="chapterBar">CHAPTER 1 : The Beginnings</div>
    <div class="cam-zone">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="holdLabel">HOLD STEADY…</div>
    </div>
    <div class="diag-zone" id="diagBox">
      <div class="profile-col"><img src="img/profile.jpg" alt="Kardia"></div>
      <div class="diag-inner">
        <div id="speakerName">KARDIA</div>
        <div id="dialogueText">…</div>
        <div class="tap-cue">TAP TO CONTINUE</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
// ══════════════════════════════════════════
//  STORY — edit this to write your narrative
// ══════════════════════════════════════════
const STORY = [
  {
    chapter: "CHAPTER 1 : The Beginnings",
    quest:   "Something familiar lingers near you.\nFind a bottle.",
    target:  "bottle",
    holdSec: 2.5,
    intro: [
      "You've arrived at last.",
      "The world looks the same to you. It isn't.",
      "Find me a bottle. Hold it in view."
    ],
    capture: [
      "There. You felt it, didn't you?",
      "The first seal breaks quietly.",
      "Follow me further."
    ]
  },
  {
    chapter: "CHAPTER 2 : The Witness",
    quest:   "Someone nearby holds a piece of this story.\nFind a person.",
    target:  "person",
    holdSec: 3,
    intro: [
      "You are not alone in this.",
      "There is someone close to you right now.",
      "Find them. Hold them in your sight."
    ],
    capture: [
      "They carry something they don't know about.",
      "A thread. Barely visible.",
      "We must keep moving."
    ]
  },
  {
    chapter: "CHAPTER 3 : The Vessel",
    quest:   "Warmth is the next clue.\nFind a cup.",
    target:  "cup",
    holdSec: 2.5,
    intro: [
      "Something small. Something held.",
      "A cup is never just a cup.",
      "Find one. Let it linger in your frame."
    ],
    capture: [
      "Yes. That warmth you felt.",
      "It belongs to this story.",
      "You are closer than you think."
    ]
  }
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let model       = null;
let chapter     = 0;
let introIdx    = 0;
let isCapturing = false;
let holdStart   = null;
let typeTimer   = null;

const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const questEl   = document.getElementById('questText');
const chapterEl = document.getElementById('chapterBar');
const diagEl    = document.getElementById('dialogueText');
const speakerEl = document.getElementById('speakerName');
const diagBox   = document.getElementById('diagBox');
const holdLabel = document.getElementById('holdLabel');

// ══════════════════════════════════════════
//  SCREEN TRANSITIONS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('s-title').addEventListener('click', boot);

async function boot() {
  showScreen('s-loading');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    model = await cocoSsd.load({ base: 'mobilenet_v2' });
    resizeCanvas();
    loadChapter(0);
    showScreen('s-game');
    detect();
  } catch(e) {
    document.querySelector('#s-loading .load-lbl').textContent = 'Camera error.';
    console.error(e);
  }
}

// ══════════════════════════════════════════
//  CHAPTER & DIALOGUE
// ══════════════════════════════════════════
function loadChapter(i) {
  chapter     = i;
  introIdx    = 0;
  isCapturing = false;
  holdStart   = null;
  holdLabel.classList.remove('show');
  const ch = STORY[i];
  chapterEl.textContent = ch.chapter;
  questEl.textContent   = ch.quest;
  type(ch.intro[0]);
}

function type(text, speaker = 'KARDIA') {
  if (typeTimer) clearInterval(typeTimer);
  speakerEl.textContent = speaker;
  diagEl.textContent    = '';
  let i = 0;
  typeTimer = setInterval(() => {
    diagEl.textContent += text[i++];
    if (i >= text.length) clearInterval(typeTimer);
  }, 38);
}

// Tap dialogue to advance intro lines
diagBox.addEventListener('click', () => {
  if (isCapturing) return;
  const next = Math.min(introIdx + 1, STORY[chapter].intro.length - 1);
  if (next !== introIdx) { introIdx = next; type(STORY[chapter].intro[introIdx]); }
});

// ══════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════
function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════════
//  DETECT LOOP
// ══════════════════════════════════════════
async function detect() {
  requestAnimationFrame(detect);
  if (!model || video.readyState < 2) return;
  resizeCanvas();

  const preds = await model.detect(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const ch  = STORY[chapter];
  const hit = preds.find(p => p.class === ch.target && p.score > 0.45);

  preds.forEach(p => drawBox(p, p.class === ch.target));

  if (isCapturing) return;

  if (hit) {
    if (!holdStart) holdStart = performance.now();
    const prog = Math.min((performance.now() - holdStart) / (ch.holdSec * 1000), 1);
    holdLabel.classList.add('show');
    drawArc(hit, prog);
    if (prog >= 1) triggerCapture(ch);
  } else {
    holdStart = null;
    holdLabel.classList.remove('show');
  }
}

// ══════════════════════════════════════════
//  CAPTURE SEQUENCE
// ══════════════════════════════════════════
function triggerCapture(ch) {
  isCapturing = true;
  holdLabel.classList.remove('show');
  questEl.textContent = '✦  CAPTURED';
  let i = 0;
  type(ch.capture[0]);
  const iv = setInterval(() => {
    i++;
    if (i < ch.capture.length) {
      type(ch.capture[i]);
    } else {
      clearInterval(iv);
      setTimeout(() => {
        if (chapter + 1 < STORY.length) {
          loadChapter(chapter + 1);
        } else {
          chapterEl.textContent = '— FIN —';
          questEl.textContent   = 'You have seen everything there is to see.';
          type('This is where the story rests.\nFor now.');
        }
      }, 2800);
    }
  }, 2800);
}

// ══════════════════════════════════════════
//  DRAWING
// ══════════════════════════════════════════
function project(bbox) {
  const [x, y, w, h] = bbox;
  const s    = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
  const offX = (canvas.width  - video.videoWidth  * s) / 2;
  const offY = (canvas.height - video.videoHeight * s) / 2;
  return { x: x*s+offX, y: y*s+offY, w: w*s, h: h*s };
}

function drawBox(pred, isTarget) {
  const { x, y, w, h } = project(pred.bbox);
  const col  = isTarget ? '#6aa0c4' : 'rgba(106,160,196,0.2)';
  const tick = isTarget ? 14 : 7;

  ctx.strokeStyle = col;
  ctx.lineWidth   = isTarget ? 1.8 : 0.9;
  ctx.shadowColor = col;
  ctx.shadowBlur  = isTarget ? 8 : 0;

  [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([cx,cy,dx,dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx + dx*tick, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy + dy*tick);
    ctx.stroke();
  });

  if (isTarget) {
    ctx.shadowBlur = 0;
    ctx.font = '10px monospace';
    ctx.fillStyle = col;
    ctx.fillText(`${pred.class.toUpperCase()}  ${Math.round(pred.score*100)}%`, x+6, y-7);
  }
  ctx.shadowBlur = 0;
}

function drawArc(pred, progress) {
  const { x, y, w, h } = project(pred.bbox);
  const cx = x + w/2, cy = y + h/2;
  const r  = Math.max(w, h) * 0.56;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(106,160,196,0.18)';
  ctx.lineWidth   = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
  ctx.strokeStyle = '#6aa0c4';
  ctx.lineWidth   = 3;
  ctx.shadowColor = '#6aa0c4';
  ctx.shadowBlur  = 14;
  ctx.stroke();
  ctx.shadowBlur  = 0;
}
</script>
</body>
</html>
